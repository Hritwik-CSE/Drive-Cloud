<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.googleusercontent.com; connect-src 'self' ws: wss: http: https: https://www.googleapis.com https://accounts.google.com; frame-src https://accounts.google.com;" />
  <meta name="description" content="CloudMount – Use your cloud storage as USB drives on your phone" />
  <title>CloudMount – Cloud as USB</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/index.css" />
</head>

<body>
  <div id="app">
    <!-- App shell rendered by JS -->
    <div class="splash-screen" id="splash">
      <div class="splash-icon">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
          <rect width="64" height="64" rx="16" fill="url(#splash-grad)" />
          <path d="M20 38V26a12 12 0 0 1 24 0v12" stroke="#fff" stroke-width="3" stroke-linecap="round" />
          <rect x="16" y="36" width="32" height="12" rx="4" fill="#fff" fill-opacity="0.9" />
          <circle cx="26" cy="42" r="2" fill="#6C5CE7" />
          <circle cx="32" cy="42" r="2" fill="#00B894" />
          <circle cx="38" cy="42" r="2" fill="#E17055" />
          <defs>
            <linearGradient id="splash-grad" x1="0" y1="0" x2="64" y2="64">
              <stop stop-color="#6C5CE7" />
              <stop offset="1" stop-color="#0984E3" />
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1 class="splash-title">CloudMount</h1>
      <p class="splash-sub">Your clouds, one tap away</p>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
